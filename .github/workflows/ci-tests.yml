name: tests

on:
  push:
  pull_request:

# Regtest integration tests for the autopayout sweep fix.
# NOTE FOR MAINTAINERS: this job is a scaffold. The author could not execute it
# (no node/bitcoinlib/flask in the dev sandbox). The test module SKIPS unless
# SHKEEPER_TEST_REGTEST=1 and a regtest node + DB/redis are reachable, so it is
# safe to enable incrementally. Service image/env names may need adjusting to
# match your infra (DB name, RPC port, credentials).
jobs:
  regtest:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.9.3
        env:
          MARIADB_ROOT_PASSWORD: shkeeper
          MARIADB_DATABASE: bitcoin-shkeeper
        ports: ["3306:3306"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
      bitcoind:
        image: vsyshost/bitcoind:27.0
        # regtest RPC; adjust args/entrypoint to your image as needed
        ports: ["18443:18443"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt pytest
      - name: Run regtest payout tests
        env:
          SHKEEPER_TEST_REGTEST: "1"
          WALLET: BTC
          COIN_NETWORK: regtest
          FULLNODE_URL: http://shkeeper:shkeeper@127.0.0.1:18443
          SQLALCHEMY_DATABASE_URI: mariadb+pymysql://root:shkeeper@127.0.0.1/bitcoin-shkeeper?charset=utf8mb4&binary_prefix=true
          REDIS_HOST: 127.0.0.1
        run: pytest tests/test_payout_sweep_regtest.py -v
